<section class="projects-wrapper d-flex justify-content-center flex-wrap gap-4">
  <!-- Project Card 1 -->
  <div class="card project-card">
    <img [src]="projects[0].image" alt="{{ projects[0].projectName }}" class="card-img-top" />
    <div class="card-body">
      <h5 class="card-title text-center">{{ projects[0].projectName }}</h5>
      <p class="card-text text-muted text-center">{{ projects[0].projectDescription }}</p>
      <div class="d-flex justify-content-center">
        <a href="#" class="btn btn-dark">Take a look</a>
      </div>
    </div>
  </div>

  <!-- Project Card 2 -->

      </div>

  </div>

</section>
